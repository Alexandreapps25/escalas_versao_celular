name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: Prepare web assets
        run: |
          mkdir -p www
                    cp "escalas_versao_celular.html" www/index.html

      - name: Init and add Android platform
        run: |
          npx cap init "Escalas" "com.escalas.app" --web-dir www
          npx cap add android
          npx cap sync android

                - name: Set app icon
                        run: |
                                  mkdir -p android/app/src/main/res/mipmap-hdpi
                                            mkdir -p android/app/src/main/res/mipmap-mdpi
                                                      mkdir -p android/app/src/main/res/mipmap-xhdpi
                                                                mkdir -p android/app/src/main/res/mipmap-xxhdpi
                                                                          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
                                                                                    convert icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
                                                                                              convert icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
                                                                                                        convert icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
                                                                                                                  convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
                                                                                                                            convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
                                                                                                                                      cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
                                                                                                                                                cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
                                                                                                                                                          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
                                                                                                                                                                    cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
                                                                                                                                                                              cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: escalas-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
